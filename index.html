<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Website Template</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="#">MyFood</a>
</div>
</nav>

<!-- Hero -->
<div class="bg-light text-center p-5">
<h1>Welcome to My Food Website</h1>
<p>Fresh and Delicious Food</p>
<button class="btn btn-danger">Order Now</button>
</div>

<!-- Menu -->
<div class="container mt-5">
<h2 class="text-center mb-4">Menu</h2>

<div class="row">

<div class="col-md-4">
<div class="card">
<img src="https://via.placeholder.com/300" class="card-img-top">
<div class="card-body text-center">
<h5>Burger</h5>
<p>$5</p>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card">
<img src="https://via.placeholder.com/300" class="card-img-top">
<div class="card-body text-center">
<h5>Pizza</h5>
<p>$8</p>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card">
<img src="https://via.placeholder.com/300" class="card-img-top">
<div class="card-body text-center">
<h5>Pasta</h5>
<p>$7</p>
</div>
</div>
</div>

</div>
</div>

<!-- About -->
<div class="container mt-5 text-center">
<h2>About Us</h2>
<p>We serve tasty food made with fresh ingredients.</p>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3 mt-5">
<p>© 2026 My Food Website</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
